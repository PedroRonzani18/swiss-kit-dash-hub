services:
  postgres:
    image: postgres:16
    container_name: swisskit-postgres
    environment:
      POSTGRES_DB: swisskit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
